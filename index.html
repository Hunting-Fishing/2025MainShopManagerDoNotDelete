
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#3B82F6" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>All Business 365 - Professional Business Management System</title>
    <meta name="description" content="Streamline your business operations with All Business 365's comprehensive work order, customer, inventory, and team management solutions for modern service businesses." />
    <meta name="keywords" content="business management, shop software, work order management, customer management, inventory tracking, service reminders, business software" />
    <meta name="author" content="All Business 365" />
    
    <!-- Open Graph / Social Media Tags -->
    <meta property="og:title" content="All Business 365 - Professional Business Management System" />
    <meta property="og:description" content="Manage customers, work orders, inventory, and team members all in one comprehensive platform. Built for modern service businesses." />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="All Business 365 - Professional Business Management System" />
    <meta name="twitter:description" content="Streamline your business operations with All Business 365's all-in-one solution." />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS PWA Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png" />
    
    <!-- Enhanced Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root">
      <!-- Bootstrap fallback: shown if React fails to mount within 8s -->
      <div id="boot-fallback" style="display:none;min-height:100vh;align-items:center;justify-content:center;font-family:system-ui,sans-serif;background:#f8fafc;padding:1rem;">
        <div style="max-width:360px;text-align:center;background:#fff;border-radius:12px;padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,.08);">
          <div style="font-size:2rem;margin-bottom:.5rem;">⚡</div>
          <h2 style="margin:0 0 .5rem;font-size:1.125rem;color:#1e293b;">Loading All Business 365</h2>
          <p style="margin:0 0 1rem;font-size:.875rem;color:#64748b;">If the app doesn't load, try the options below.</p>
          <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;">
            <button onclick="window.location.reload()" style="padding:.5rem 1rem;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:.8125rem;">Reload</button>
            <button onclick="window.location.href='/'" style="padding:.5rem 1rem;border-radius:8px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-size:.8125rem;">Go to Home</button>
            <button onclick="if('caches' in window){caches.keys().then(k=>Promise.all(k.map(n=>caches.delete(n))))};window.location.reload()" style="padding:.5rem 1rem;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:.8125rem;">Clear Cache</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      // Show boot fallback only if React completely fails to mount within 15 seconds
      var _bootTimer = setTimeout(function() {
        var root = document.getElementById('root');
        var fallback = document.getElementById('boot-fallback');
        // Only show if React hasn't rendered anything besides the fallback div
        if (root && fallback && root.childElementCount <= 1) {
          fallback.style.display = 'flex';
        }
      }, 15000);
      // React will clear this once mounted
      window.__clearBootTimer = function() { clearTimeout(_bootTimer); var f = document.getElementById('boot-fallback'); if(f) f.remove(); };
    </script>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script>
      // Force complete cache clear for theme context issue - v3.0
      if ('caches' in window) {
        caches.keys().then(names => {
          names.forEach(name => caches.delete(name));
        });
      }
      // Clear any existing service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(registration => registration.unregister());
        });
      }
      // Force browser cache refresh
      if (window.localStorage) {
        window.localStorage.removeItem('theme');
        window.localStorage.removeItem('themeContext');
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
